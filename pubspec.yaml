name: agrosoft
description: Agrosoft - Agricultural Business Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  curved_navigation_bar: ^1.0.6
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  provider: ^6.1.2
  shared_preferences: ^2.5.5
  dio: ^5.4.3
  geolocator: ^12.0.0
  device_info_plus: ^10.1.0
  http: ^1.2.1
  sms_autofill: ^2.4.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
